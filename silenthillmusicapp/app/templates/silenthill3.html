{% extends "index.html" %}

{% block title %}
Silent Hill | Game 3
{% endblock title %}

{% block content %}

<h1>SILENT HILL 3</h1>
<h2>Tracklist</h2>

<ul class="album-tracklist">
    {% for song in songs %}
    <li>
        <a href="{% url 'player' song.id %}">{{ song.title }}</a>
    </li>
    {% endfor %}
</ul>


{% endblock content %}
